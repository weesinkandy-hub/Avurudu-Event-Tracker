<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>අවුරුදු උත්සව සෙවුම 2026</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.css" />
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Sinhala:wght@400;700&display=swap" rel="stylesheet">

    <style>
        :root { --p: #f97316; --s: #ef4444; --bg: #fff7ed; }
        * { box-sizing: border-box; font-family: 'Noto Sans Sinhala', sans-serif; }
        body { background-color: var(--bg); padding: 15px; margin: 0; }
        
        .header { 
            text-align: center; background: linear-gradient(135deg, var(--p), var(--s)); 
            color: white; padding: 20px; border-radius: 20px; margin-bottom: 20px;
            box-shadow: 0 5px 15px rgba(239, 68, 68, 0.3);
        }

        .card { background: white; padding: 20px; border-radius: 25px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 20px; }
        #map { height: 350px; border-radius: 15px; border: 2px solid #fed7aa; margin: 15px 0; }
        
        input, button { width: 100%; padding: 12px; margin: 8px 0; border-radius: 30px; border: 1px solid #fdba74; outline: none; }
        .btn-main { background: linear-gradient(135deg, var(--p), var(--s)); color: white; border: none; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .btn-main:hover { transform: scale(1.02); }
        .btn-gps { background: #0ea5e9; color: white; border: none; font-weight: bold; cursor: pointer; }

        .event-card { border-left: 5px solid var(--p); padding: 15px; background: #fffcf9; margin-bottom: 15px; border-radius: 10px; }
        .tag { font-size: 0.8rem; background: #fef08a; padding: 3px 10px; border-radius: 15px; font-weight: bold; }
    </style>
</head>
<body>

    <div class="header">
        <h1>🌞 අවුරුදු උත්සව සෙවුම - 2026</h1>
        <p>ඔබේ ප්‍රදේශයේ උත්සව සිතියමට එක් කරන්න</p>
    </div>

    <div class="card">
        <h3>📍 උත්සවයක් එක් කරන්න</h3>
        <input type="text" id="eventName" placeholder="උත්සවයේ නම (උදා: බක්මහ උළෙල)">
        <input type="datetime-local" id="eventDate">
        
        <button class="btn-gps" onclick="getLocation()">🎯 මගේ වත්මන් ස්ථානය ගන්න (GPS)</button>
        <p style="font-size: 0.8rem; color: #666; text-align: center;">හෝ Map එකෙන් තැනක් සර්ච් කරන්න</p>
        
        <div id="map"></div>
        <p id="locStatus" style="color: #16a34a; font-size: 0.9rem; font-weight: bold;"></p>
        
        <button class="btn-main" onclick="publishEvent()">සජීවීව පබ්ලිෂ් කරන්න</button>
    </div>

    <div class="card">
        <h3>📅 ඉදිරි උත්සව (Live Feed)</h3>
        <div id="eventFeed">දත්ත පූරණය වෙමින් පවතී...</div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // ඔබ ලබාදුන් Config එක
        const firebaseConfig = {
            apiKey: "AIzaSyDt3OFSuDiNAZrHN9YpRsFW7ZxUQ5_QbsE",
            authDomain: "avurudu-event-tracker.firebaseapp.com",
            projectId: "avurudu-event-tracker",
            storageBucket: "avurudu-event-tracker.firebasestorage.app",
            messagingSenderId: "554737882823",
            appId: "1:554737882823:web:f80d57927fb36c910850e2",
            measurementId: "G-WQ4J04D87F"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Map පාලනය
        var map = L.map('map').setView([7.8731, 80.7718], 7);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
        
        var marker;
        var selectedLat, selectedLng;

        // Search Bar එක (Geocoder)
        import { } from "https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.js";
        const geocoder = L.Control.geocoder({ defaultMarkGeocode: false })
            .on('markgeocode', function(e) {
                updateMarker(e.geocode.center.lat, e.geocode.center.lng, e.geocode.name);
                map.setView(e.geocode.center, 15);
            }).addTo(map);

        // GPS හරහා ස්ථානය ලබා ගැනීම
        window.getLocation = function() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition((pos) => {
                    updateMarker(pos.coords.latitude, pos.coords.longitude, "ඔබේ වත්මන් ස්ථානය");
                    map.setView([pos.coords.latitude, pos.coords.longitude], 15);
                }, () => alert("GPS ලබා ගැනීමට නොහැකි විය. කරුණාකර අවසර දෙන්න."));
            }
        };

        function updateMarker(lat, lng, msg) {
            selectedLat = lat; selectedLng = lng;
            if (marker) map.removeLayer(marker);
            marker = L.marker([lat, lng]).addTo(map).bindPopup(msg).openPopup();
            document.getElementById("locStatus").innerText = "✔ ස්ථානය සලකුණු කරගන්නා ලදී!";
        }

        map.on('click', (e) => updateMarker(e.latlng.lat, e.latlng.lng, "තෝරාගත් ස්ථානය"));

        // දත්ත යැවීම
        window.publishEvent = async function() {
            const name = document.getElementById("eventName").value;
            const date = document.getElementById("eventDate").value;

            if(!name || !date || !selectedLat) return alert("කරුණාකර සියලු විස්තර පුරවන්න!");

            try {
                await addDoc(collection(db, "events"), {
                    name, date, lat: selectedLat, lng: selectedLng, createdAt: new Date()
                });
                alert("සාර්ථකව පබ්ලිෂ් වුනා!");
                document.getElementById("eventName").value = "";
            } catch (e) { alert("දෝෂයක් ඇතිවිය: " + e.message); }
        };

        // දත්ත ගෙන්වා ගැනීම (Real-time)
        const q = query(collection(db, "events"), orderBy("createdAt", "desc"));
        onSnapshot(q, (snapshot) => {
            const feed = document.getElementById("eventFeed");
            feed.innerHTML = "";
            snapshot.forEach((doc) => {
                const data = doc.data();
                feed.innerHTML += `
                    <div class="event-card">
                        <span class="tag">${new Date(data.date).toLocaleString()}</span>
                        <h4>${data.name}</h4>
                        <button class="btn-main" style="padding:5px; font-size:0.8rem; width:auto;" 
                                onclick="focusOnMap(${data.lat}, ${data.lng}, '${data.name}')">සිතියමේ බලන්න</button>
                    </div>
                `;
                L.marker([data.lat, data.lng]).addTo(map).bindPopup(data.name);
            });
        });

        window.focusOnMap = (lat, lng, name) => {
            map.setView([lat, lng], 15);
            L.popup().setLatLng([lat, lng]).setContent(name).openOn(map);
            window.scrollTo({ top: 0, behavior: 'smooth' });
        };
    </script>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.js"></script>
</body>
</html>
