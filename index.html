<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>අවුරුදු උත්සව සෙවුම - 2026</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.css" />
    
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Sinhala:wght@400;600;700&family=Poppins:wght@400;600&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary-color: #f97316; /* Avurudu Orange */
            --secondary-color: #ef4444; /* Red */
            --bg-color: #fff7ed;
            --card-bg: #ffffff;
            --text-main: #1e293b;
        }

        * {
            box-sizing: border-box;
            font-family: 'Noto Sans Sinhala', 'Poppins', sans-serif;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            padding: 20px;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
            padding: 20px;
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            color: white;
            border-radius: 20px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }

        .container {
            display: flex;
            flex-wrap: wrap;
            gap: 30px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .section {
            background-color: var(--card-bg);
            border-radius: 24px;
            padding: 25px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
            flex: 1 1 400px;
        }

        h2 {
            margin-bottom: 20px;
            font-size: 1.5rem;
            color: var(--primary-color);
        }

        /* Form Styles */
        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
        }

        .form-group input, .form-group textarea {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #fdba74;
            border-radius: 12px;
            font-size: 1rem;
            outline: none;
            transition: 0.3s ease;
        }

        .form-group input:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(249, 115, 22, 0.2);
        }

        /* Map Styles */
        #map {
            height: 300px;
            border-radius: 16px;
            margin-bottom: 15px;
            border: 2px solid #fed7aa;
            z-index: 1;
        }

        /* Button Styles */
        .btn {
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            color: white;
            border: none;
            padding: 14px 24px;
            font-size: 1.1rem;
            font-weight: bold;
            border-radius: 30px; /* ලස්සන Pill Shape එක */
            cursor: pointer;
            width: 100%;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 4px 10px rgba(249, 115, 22, 0.3);
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 15px rgba(249, 115, 22, 0.4);
        }

        /* Image Upload Styles */
        .file-upload {
            position: relative;
            overflow: hidden;
            display: inline-block;
            width: 100%;
        }

        .file-upload input[type=file] {
            font-size: 100px;
            position: absolute;
            left: 0;
            top: 0;
            opacity: 0;
            cursor: pointer;
        }

        .upload-btn {
            background-color: #fff;
            border: 2px dashed var(--primary-color);
            color: var(--primary-color);
            padding: 15px;
            border-radius: 12px;
            text-align: center;
            font-weight: bold;
            cursor: pointer;
            display: block;
        }

        /* Feed Styles */
        .event-card {
            border: 1px solid #fed7aa;
            border-radius: 16px;
            padding: 15px;
            margin-bottom: 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .event-card img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            border-radius: 12px;
        }

        .event-details h3 {
            color: var(--text-main);
            margin-bottom: 5px;
        }

        .event-details p {
            color: #64748b;
            font-size: 0.9rem;
            margin-bottom: 5px;
        }

        .tag-badge {
            display: inline-block;
            background-color: #fef08a;
            color: #854d0e;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>🌞 සූර්ය මංගල්‍යය - අවුරුදු උත්සව සෙවුම 2026</h1>
        <p>ඔබේ ප්‍රදේශයේ අවුරුදු උත්සව සිතියමට එක් කරන්න, අන් අයගේ උත්සව සොයාගන්න!</p>
    </div>

    <div class="container">
        
        <div class="section">
            <h2>🎉 නව උත්සවයක් එක් කරන්න</h2>
            
            <div class="form-group">
                <label>උත්සවයේ නම</label>
                <input type="text" id="eventName" placeholder="උදා: ගාලු මුවදොර අවුරුදු කුමරා">
            </div>
            
            <div class="form-group">
                <label>දිනය සහ වේලාව</label>
                <input type="datetime-local" id="eventDate">
            </div>

            <div class="form-group">
                <label>ආරාධනා පත්‍රය (Image)</label>
                <div class="file-upload">
                    <div class="upload-btn" id="uploadText">📸 පින්තූරයක් තෝරන්න</div>
                    <input type="file" id="eventImage" accept="image/*" onchange="updateFileName(this)">
                </div>
            </div>

            <div class="form-group">
                <label>📍 Map එකෙන් Search කර හෝ Click කර ස්ථානය Tag කරන්න</label>
                <div id="map"></div>
                <p id="locationText" style="color: green; font-size: 0.9rem; margin-top: 5px;">ස්ථානයක් තෝරාගෙන නැත.</p>
            </div>

            <button class="btn" onclick="submitEvent()">උත්සවය පබ්ලිෂ් කරන්න</button>
        </div>

        <div class="section">
            <h2>📅 ඉදිරි අවුරුදු උත්සව</h2>
            <div id="eventsFeed">
                <div class="event-card">
                    <img src="https://images.unsplash.com/photo-1533174000265-e8c4cceefd41?ixlib=rb-4.0.3&auto=format&fit=crop&w=600&q=80" alt="Avurudu Poster">
                    <div class="event-details">
                        <span class="tag-badge">අප්‍රේල් 14 - පෙ.ව 9.00</span>
                        <h3>බක්මහ උළෙල - මහනුවර</h3>
                        <p>📍 මහනුවර ගැටඹේ ක්‍රීඩාංගනය</p>
                    </div>
                </div>
            </div>
        </div>

    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.js"></script>
    
    <script>
        var map = L.map('map').setView([7.8731, 80.7718], 7);
        var selectedMarker = null;
        var selectedLat = null;
        var selectedLng = null;

        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap contributors'
        }).addTo(map);

        // --- Search Bar එක Map එකට එක් කිරීම (Geocoder) ---
        var geocoder = L.Control.geocoder({
            defaultMarkGeocode: false,
            placeholder: 'ස්ථානයක් සොයන්න (උදා: Colombo)...'
        })
        .on('markgeocode', function(e) {
            var bbox = e.geocode.bbox;
            var poly = L.polygon([
                bbox.getSouthEast(),
                bbox.getNorthEast(),
                bbox.getNorthWest(),
                bbox.getSouthWest()
            ]);
            map.fitBounds(poly.getBounds());
            
            selectedLat = e.geocode.center.lat;
            selectedLng = e.geocode.center.lng;

            if (selectedMarker) {
                map.removeLayer(selectedMarker);
            }
            selectedMarker = L.marker([selectedLat, selectedLng]).addTo(map);
            selectedMarker.bindPopup("ඔබ සෙවූ ස්ථානය: " + e.geocode.name).openPopup();
            
            document.getElementById("locationText").innerText = "✔ " + e.geocode.name + " Tag කරගන්නා ලදී!";
        })
        .addTo(map);

        // Click කර ලොකේෂන් එක Tag කිරීම
        map.on('click', function(e) {
            selectedLat = e.latlng.lat;
            selectedLng = e.latlng.lng;

            if (selectedMarker) {
                map.removeLayer(selectedMarker);
            }
            selectedMarker = L.marker([selectedLat, selectedLng]).addTo(map);
            selectedMarker.bindPopup("ඔබ තෝරාගත් ස්ථානය!").openPopup();
            
            document.getElementById("locationText").innerText = "✔ ස්ථානය සාර්ථකව Tag කරගන්නා ලදී!";
        });

        function updateFileName(input) {
            if (input.files && input.files[0]) {
                document.getElementById('uploadText').innerText = "✔ " + input.files[0].name;
                document.getElementById('uploadText').style.borderColor = "green";
                document.getElementById('uploadText').style.color = "green";
            }
        }

        function submitEvent() {
            var name = document.getElementById("eventName").value;
            var date = document.getElementById("eventDate").value;
            var imageInput = document.getElementById("eventImage");
            
            if(!name || !date || !selectedLat) {
                alert("කරුණාකර උත්සවයේ නම, දිනය සහ Map එකෙන් ස්ථානයක් තෝරන්න (Search කර හෝ Click කර)!");
                return;
            }

            var imageUrl = "https://via.placeholder.com/600x200?text=පෝස්ටරය+ඇතුලත්+කර+නැත";
            if(imageInput.files && imageInput.files[0]) {
                imageUrl = URL.createObjectURL(imageInput.files[0]);
            }

            var newCard = `
                <div class="event-card">
                    <img src="${imageUrl}" alt="Uploaded Poster">
                    <div class="event-details">
                        <span class="tag-badge">${new Date(date).toLocaleString()}</span>
                        <h3>${name}</h3>
                        <p>📍 ටැග් කල ස්ථානය: Lat ${selectedLat.toFixed(2)}, Lng ${selectedLng.toFixed(2)}</p>
                    </div>
                </div>
            `;

            document.getElementById("eventsFeed").insertAdjacentHTML('afterbegin', newCard);

            alert("ඔබගේ උත්සවය සාර්ථකව පබ්ලිෂ් කළා!");
            
            document.getElementById("eventName").value = "";
            document.getElementById("eventDate").value = "";
            document.getElementById("uploadText").innerText = "📸 පින්තූරයක් තෝරන්න";
            document.getElementById("uploadText").style.borderColor = "var(--primary-color)";
            document.getElementById("uploadText").style.color = "var(--primary-color)";
            document.getElementById("locationText").innerText = "ස්ථානයක් තෝරාගෙන නැත.";
            if(selectedMarker) map.removeLayer(selectedMarker);
            selectedLat = null;
        }
    </script>
</body>
</html>
